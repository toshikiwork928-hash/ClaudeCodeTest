<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05060f">
<title>DRONE TAXI - 海上ステージ1 (16bit/mobile)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #05060f;
    color: #fff;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    height: 100%;
    overflow: hidden;
    /* スマホでのタップ遅延・選択・長押しメニュー・スクロールを抑止 */
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #wrap {
    width: 100%;
    height: 100%;
    /* iOS Safari のアドレスバー込みの実高さ */
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16224a 0%, #070912 60%, #04050c 100%);
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border-radius: 6px;
    box-shadow:
      0 0 0 3px #0a1430,
      0 0 0 6px #1b2a5e,
      0 10px 40px rgba(0,0,0,.7),
      0 0 60px rgba(60,120,255,.18);
    max-width: 98vw;
    max-height: 88vh;
    touch-action: none;
  }
  #hint {
    font-size: 12px;
    color: #8fa3c8;
    letter-spacing: .5px;
    text-align: center;
    padding: 0 8px;
  }
  #hint b { color: #ffd23f; }
  /* スマホでは操作説明を簡略化 */
  @media (pointer: coarse), (max-width: 640px) {
    #hint .pc { display: none; }
  }
  @media (pointer: fine) {
    #hint .touch { display: none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="320" height="240"></canvas>
  <div id="hint">
    <span class="pc">移動: <b>方向キー / WASD</b> &nbsp;｜&nbsp; ブースト: <b>Shift / Z</b> &nbsp;｜&nbsp; 決定: <b>Enter / Space</b></span>
    <span class="touch">画面を<b>ドラッグ</b>で移動 ｜ 右下の<b>BOOST</b>でブースト ｜ <b>タップ</b>で決定</span>
  </div>
</div>

<script>
(() => {
"use strict";

// ============================================================
// 基本セットアップ (SNES風: 320x240)
// ============================================================
const W = 320, H = 240;
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

function fitCanvas() {
  // 操作説明ぶんの余白を確保しつつ、画面いっぱいに拡大
  const maxW = Math.min(window.innerWidth * 0.98, 1280);
  const maxH = window.innerHeight * 0.88;
  let scale = Math.max(0.5, Math.min(maxW / W, maxH / H));
  // 表示倍率は連続値でOK(できるだけ大きく)。CSS側でpixelated指定済み
  canvas.style.width  = (W * scale) + "px";
  canvas.style.height = (H * scale) + "px";
}
window.addEventListener("resize", fitCanvas);
window.addEventListener("orientationchange", () => setTimeout(fitCanvas, 150));
fitCanvas();

// ============================================================
// 16bitパレット (グラデーション多用)
// ============================================================
const COL = {
  // 空
  skyHi:  "#3a78d8",
  skyMid: "#6db6f2",
  skyLo:  "#bfe8ff",
  sun:    "#fff4c2",
  sunGlow:"#ffe89a",
  // 雲
  cloudHi:"#ffffff",
  cloud:  "#dfeaff",
  cloudSh:"#aebfe6",
  // 遠景の島
  hazeFar:"#9fc2e8",
  hazeMid:"#7aa6d8",
  // 海
  seaTop: "#2bb6c8",
  seaMid: "#1668c8",
  seaLo:  "#0a2f8e",
  seaDeep:"#06205f",
  foam:   "#dffaff",
  foam2:  "#9fe6ff",
  glitter:"#eafcff",
  // 陸地
  sandHi: "#ffe9a8",
  sand:   "#f6c66a",
  sandSh: "#c98a2e",
  grassHi:"#7ed957",
  grass:  "#2faa3e",
  grassSh:"#1c7a2c",
  trunk:  "#7a4a22",
  trunkSh:"#5a3416",
  // 自機 タクシー
  taxiHi: "#ffe65a",
  taxi:   "#ffc21f",
  taxiSh: "#e07a12",
  taxiDk: "#9c4e08",
  glassHi:"#cdfbff",
  glass:  "#5ec8f0",
  glassSh:"#2b6fb0",
  metalHi:"#e8edf5",
  metal:  "#9aa6bd",
  metalSh:"#5a6478",
  // 敵・障害物
  mineHi: "#6b7486",
  mine:   "#3a4252",
  mineSh: "#1c2230",
  enemyHi:"#e87bff",
  enemy:  "#b031e0",
  enemySh:"#6c139c",
  buoyHi: "#ff8a7a",
  buoy:   "#e23b2e",
  buoySh: "#9c1c14",
  // 光・弾・UI
  bullet: "#ffeb6b",
  bulletC:"#ff5a2a",
  battGood:"#39e07a",
  battWarn:"#ffd23f",
  battBad: "#ff4d4d",
  white:  "#ffffff",
  ink:    "#0a0e1a",
};

// 静的グラデーション(解像度固定なので一度だけ生成)
const gSky = ctx.createLinearGradient(0, 0, 0, 168);
gSky.addColorStop(0,   COL.skyHi);
gSky.addColorStop(0.55,COL.skyMid);
gSky.addColorStop(1,   COL.skyLo);

const SEA_Y = 168;
const gSea = ctx.createLinearGradient(0, SEA_Y, 0, H);
gSea.addColorStop(0,   COL.seaTop);
gSea.addColorStop(0.18,COL.seaMid);
gSea.addColorStop(0.55,COL.seaLo);
gSea.addColorStop(1,   COL.seaDeep);

const gSeaNight = ctx.createLinearGradient(0, SEA_Y, 0, H);
gSeaNight.addColorStop(0,  "#103a6a");
gSeaNight.addColorStop(0.4,"#0a2256");
gSeaNight.addColorStop(1,  "#04113a");

const gSkyNight = ctx.createLinearGradient(0, 0, 0, SEA_Y);
gSkyNight.addColorStop(0,  "#0b1640");
gSkyNight.addColorStop(0.6,"#14245e");
gSkyNight.addColorStop(1,  "#2a3f7a");

// ============================================================
// 入力
// ============================================================
const keys = {};
const pressedOnce = {};
window.addEventListener("keydown", (e) => {
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  if (!keys[k]) pressedOnce[k] = true;
  keys[k] = true;
  if ([" ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
});
window.addEventListener("keyup", (e) => {
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  keys[k] = false;
});
function consume(k) { if (pressedOnce[k]) { pressedOnce[k] = false; return true; } return false; }
function held(...ks) { return ks.some(k => keys[k]); }

// ------------------------------------------------------------
// タッチ入力(スマホ): ドラッグで移動 + 画面右下のBOOSTボタン + タップで決定
// ------------------------------------------------------------
const isTouch = (window.matchMedia && window.matchMedia("(pointer: coarse)").matches) || ("ontouchstart" in window);
const touch = {
  move: { active: false, gx: 0, gy: 0 }, // 移動目標(ゲーム座標)
  boost: false,
  moveId: null,
  boostId: null,
};
let touchConfirm = false; // タップでの決定フラグ

// BOOSTボタン(ゲーム座標。画面右下)
const BTN = { x: W - 38, y: H - 36, r: 28 };

function clientToGame(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    gx: (clientX - r.left) / r.width * W,
    gy: (clientY - r.top) / r.height * H,
  };
}
function inBoostButton(gx, gy) {
  const dx = gx - BTN.x, dy = gy - BTN.y;
  return (dx * dx + dy * dy) <= (BTN.r + 8) * (BTN.r + 8);
}

function handleTouchStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const { gx, gy } = clientToGame(t.clientX, t.clientY);
    touchConfirm = true; // どこを触っても決定扱い(タイトル等)
    if (inBoostButton(gx, gy)) {
      touch.boostId = t.identifier;
      touch.boost = true;
    } else if (touch.moveId === null) {
      touch.moveId = t.identifier;
      touch.move.active = true;
      touch.move.gx = gx; touch.move.gy = gy;
    }
  }
}
function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touch.moveId) {
      const { gx, gy } = clientToGame(t.clientX, t.clientY);
      touch.move.gx = gx; touch.move.gy = gy;
    }
  }
}
function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touch.moveId) { touch.move.active = false; touch.moveId = null; }
    if (t.identifier === touch.boostId) { touch.boost = false; touch.boostId = null; }
  }
}
if (isTouch) {
  canvas.addEventListener("touchstart", handleTouchStart, { passive: false });
  canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
  canvas.addEventListener("touchend", handleTouchEnd, { passive: false });
  canvas.addEventListener("touchcancel", handleTouchEnd, { passive: false });
  // ダブルタップ拡大などの抑止
  document.addEventListener("gesturestart", (e) => e.preventDefault());
  document.addEventListener("dblclick", (e) => e.preventDefault());
}

function consumeTouchConfirm() { if (touchConfirm) { touchConfirm = false; return true; } return false; }
function tapAnyConfirm() { return consume("Enter") || consume(" ") || consume("z") || consumeTouchConfirm(); }

// ============================================================
// 描画ヘルパ
// ============================================================
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x | 0, y | 0, Math.ceil(w), Math.ceil(h)); }
function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
function rrect(x, y, w, h, r, c) {
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill();
}
function glow(x, y, r, c, a) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, c);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.globalAlpha = a;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
// ゲーム状態
// ============================================================
const STATE = { TITLE: 0, PLAY: 1, FALLING: 2, GAMEOVER: 3, CLEAR: 4 };
let state = STATE.TITLE;

const STAGE_LEN = 4600;
const GOAL_X = STAGE_LEN;
const SCROLL_BASE = 1.0;

let cameraX, player, obstacles, bullets, particles;
let cloudsFar, cloudsNear, islandsFar;
let waves, nextSpawnX, frame, shake, result, flashTimer;

function resetGame() {
  cameraX = 0; frame = 0; shake = 0; flashTimer = 0; result = "";
  player = {
    x: 80, y: 110, w: 28, h: 17,
    battery: 100, maxBattery: 100,
    invuln: 0, boost: false, rotorPhase: 0, fallVy: 0, tilt: 0,
  };
  obstacles = []; bullets = []; particles = [];
  nextSpawnX = 360;
  cloudsFar = []; cloudsNear = []; islandsFar = [];
  for (let i = 0; i < 7; i++)
    cloudsFar.push({ x: Math.random() * STAGE_LEN, y: 14 + Math.random() * 50, s: 0.18 + Math.random() * 0.12, sz: 10 + Math.random() * 12 });
  for (let i = 0; i < 5; i++)
    cloudsNear.push({ x: Math.random() * STAGE_LEN, y: 20 + Math.random() * 60, s: 0.4 + Math.random() * 0.18, sz: 14 + Math.random() * 14 });
  for (let i = 0; i < 6; i++)
    islandsFar.push({ x: Math.random() * STAGE_LEN, s: 0.32, w: 50 + Math.random() * 70, h: 14 + Math.random() * 18 });
  waves = 0;
}

// ============================================================
// 障害物・敵の生成
// ============================================================
function spawnEntity(worldX) {
  const r = Math.random();
  if (r < 0.38) {
    const baseY = 50 + Math.random() * (SEA_Y - 80);
    obstacles.push({ type: "mine", x: worldX, y: baseY, baseY, w: 18, h: 18,
      phase: Math.random() * Math.PI * 2, amp: 14 + Math.random() * 18, alive: true });
  } else if (r < 0.66) {
    obstacles.push({ type: "buoy", x: worldX, y: SEA_Y - 26, w: 20, h: 30, alive: true,
      bob: Math.random() * Math.PI * 2 });
  } else {
    const baseY = 38 + Math.random() * (SEA_Y - 92);
    obstacles.push({ type: "bird", x: worldX, y: baseY, baseY, w: 22, h: 16, alive: true,
      phase: Math.random() * Math.PI * 2, amp: 20 + Math.random() * 16,
      cool: 60 + Math.floor(Math.random() * 60), rotorPhase: 0 });
  }
}

// ============================================================
// 背景描画
// ============================================================
function drawSky(night) {
  ctx.fillStyle = night ? gSkyNight : gSky;
  ctx.fillRect(0, 0, W, SEA_Y);
  if (!night) {
    // 太陽とグロー
    const sx = 250, sy = 46;
    glow(sx, sy, 60, COL.sunGlow, 0.5);
    glow(sx, sy, 30, COL.sun, 0.9);
    ctx.fillStyle = COL.sun;
    ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI * 2); ctx.fill();
  }
}

function drawCloud(x, y, s, alpha) {
  ctx.globalAlpha = alpha;
  // 影 → 本体 → ハイライト
  blob(x, y + s * 0.25, s, COL.cloudSh);
  blob(x, y, s, COL.cloud);
  blob(x - s * 0.3, y - s * 0.28, s * 0.7, COL.cloudHi);
  ctx.globalAlpha = 1;
}
function blob(x, y, s, c) {
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.arc(x, y, s, 0, Math.PI * 2);
  ctx.arc(x + s * 0.9, y + s * 0.15, s * 0.75, 0, Math.PI * 2);
  ctx.arc(x - s * 0.9, y + s * 0.2, s * 0.7, 0, Math.PI * 2);
  ctx.arc(x + s * 0.3, y - s * 0.5, s * 0.6, 0, Math.PI * 2);
  ctx.fill();
}

function drawFarIslands() {
  for (const is of islandsFar) {
    const sx = ((is.x - cameraX * is.s) % (STAGE_LEN)) ;
    let x = is.x - cameraX * is.s;
    x = ((x % (W + 160)) + (W + 160)) % (W + 160) - 80;
    // 霞んだ島影
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = COL.hazeFar;
    ctx.beginPath();
    ctx.moveTo(x, SEA_Y);
    ctx.quadraticCurveTo(x + is.w * 0.5, SEA_Y - is.h, x + is.w, SEA_Y);
    ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = COL.hazeMid;
    ctx.beginPath();
    ctx.moveTo(x + is.w * 0.2, SEA_Y);
    ctx.quadraticCurveTo(x + is.w * 0.5, SEA_Y - is.h * 0.7, x + is.w * 0.8, SEA_Y);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawSea(night) {
  ctx.fillStyle = night ? gSeaNight : gSea;
  ctx.fillRect(0, SEA_Y, W, H - SEA_Y);

  // 太陽のきらめき帯(中央やや右)
  if (!night) {
    for (let y = SEA_Y + 4; y < H; y += 3) {
      const t = (y - SEA_Y) / (H - SEA_Y);
      const spread = 10 + t * 80;
      const cx = 250 - t * 30;
      const n = 3 + Math.floor(t * 5);
      for (let i = 0; i < n; i++) {
        const gx = cx + (Math.random() - 0.5) * spread;
        if (Math.sin((gx + frame * 2 + y * 3) * 0.3) > 0.3) {
          ctx.globalAlpha = 0.35 * (1 - t * 0.4);
          px(gx, y, 2 + Math.random() * 3, 1, COL.glitter);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // 波の陰影バンド(パララックス)
  for (let y = SEA_Y + 6; y < H; y += 6) {
    const t = (y - SEA_Y) / (H - SEA_Y);
    const amp = 1.5 + t * 2.5;
    const step = 14 + t * 8;
    ctx.globalAlpha = 0.25 + t * 0.2;
    ctx.fillStyle = COL.seaDeep;
    for (let x = -step; x < W + step; x += step) {
      const off = Math.sin((x + cameraX * (0.4 + t * 0.6) + waves * 5 + y) * 0.06) * amp;
      px(x + off, y, step * 0.5, 2, COL.seaDeep);
    }
  }
  ctx.globalAlpha = 1;

  // 海面のハイライトライン
  px(0, SEA_Y, W, 1, COL.seaTop);
  for (let x = -10; x < W; x += 14) {
    const wx = x - ((cameraX * 0.5) % 14);
    const wy = SEA_Y + 2 + Math.sin((x + waves * 4) * 0.35) * 1.5;
    ctx.globalAlpha = 0.8;
    px(wx, wy, 7, 2, COL.foam2);
    px(wx + 2, wy, 3, 1, COL.foam);
  }
  ctx.globalAlpha = 1;
}

function drawBackground(night) {
  drawSky(night);
  // 遠景雲
  for (const c of cloudsFar) {
    let x = c.x - cameraX * c.s;
    x = ((x % (W + 120)) + (W + 120)) % (W + 120) - 60;
    drawCloud(x, c.y, c.sz, 0.55);
  }
  drawFarIslands();
  // 近景雲
  for (const c of cloudsNear) {
    let x = c.x - cameraX * c.s;
    x = ((x % (W + 140)) + (W + 140)) % (W + 140) - 70;
    drawCloud(x, c.y, c.sz, 0.9);
  }
  drawSea(night);

  // ゴールの陸地
  const landScreenX = GOAL_X - cameraX;
  if (landScreenX < W + 60) drawGoalLand(landScreenX);
}

function drawGoalLand(sx) {
  const groundY = SEA_Y - 4;
  const right = W - sx + 60;
  // 砂浜グラデ
  const gSand = ctx.createLinearGradient(0, groundY, 0, H);
  gSand.addColorStop(0, COL.sandHi);
  gSand.addColorStop(0.4, COL.sand);
  gSand.addColorStop(1, COL.sandSh);
  ctx.fillStyle = gSand;
  ctx.fillRect(sx, groundY, right, H - groundY);
  // 波打ち際の泡
  ctx.globalAlpha = 0.8;
  for (let i = 0; i < right; i += 8) px(sx + i, groundY - 1, 5, 2, COL.foam);
  ctx.globalAlpha = 1;
  // 草地グラデ
  const gGrass = ctx.createLinearGradient(0, groundY - 26, 0, groundY + 4);
  gGrass.addColorStop(0, COL.grassHi);
  gGrass.addColorStop(0.5, COL.grass);
  gGrass.addColorStop(1, COL.grassSh);
  ctx.fillStyle = gGrass;
  ctx.beginPath();
  ctx.moveTo(sx + 6, groundY);
  ctx.quadraticCurveTo(sx + 40, groundY - 30, sx + 90, groundY - 22);
  ctx.quadraticCurveTo(sx + 160, groundY - 14, sx + right, groundY - 24);
  ctx.lineTo(sx + right, groundY + 4);
  ctx.lineTo(sx + 6, groundY + 4);
  ctx.fill();

  drawPalm(sx + 40, groundY - 20, 1.0);
  drawPalm(sx + 86, groundY - 16, 0.8);
  drawLighthouse(sx + 58, groundY - 22);

  // GOAL 旗(なびく)
  const fx = sx + 22, fyTop = groundY - 96;
  px(fx, fyTop, 2, 60, COL.metalSh);
  px(fx, fyTop, 2, 60, COL.metal);
  const wave = Math.sin(frame * 0.15) * 2;
  ctx.fillStyle = COL.bulletC;
  ctx.beginPath();
  ctx.moveTo(fx + 2, fyTop);
  ctx.lineTo(fx + 28, fyTop + 4 + wave);
  ctx.lineTo(fx + 28, fyTop + 14 + wave);
  ctx.lineTo(fx + 2, fyTop + 16);
  ctx.fill();
  ctx.fillStyle = COL.white;
  ctx.font = "bold 9px 'Trebuchet MS', sans-serif";
  ctx.textBaseline = "top";
  ctx.textAlign = "left";
  ctx.fillText("GOAL", fx + 5, fyTop + 4);
}

function drawPalm(x, y, sc) {
  const h = 30 * sc;
  // 幹
  ctx.strokeStyle = COL.trunkSh;
  ctx.lineWidth = 4 * sc;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x - 4, y - h * 0.6, x + 2, y - h); ctx.stroke();
  ctx.strokeStyle = COL.trunk;
  ctx.lineWidth = 2 * sc;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x - 4, y - h * 0.6, x + 2, y - h); ctx.stroke();
  // 葉
  const lx = x + 2, ly = y - h;
  const leaves = [[-18,-6],[18,-6],[-12,-14],[12,-14],[0,-18]];
  ctx.lineWidth = 3 * sc;
  for (const [dx, dy] of leaves) {
    ctx.strokeStyle = COL.grassSh;
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.quadraticCurveTo(lx + dx * 0.5 * sc, ly + dy * sc - 2, lx + dx * sc, ly + (dy + 4) * sc); ctx.stroke();
    ctx.strokeStyle = COL.grass;
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.quadraticCurveTo(lx + dx * 0.5 * sc, ly + dy * sc - 3, lx + dx * sc, ly + (dy + 3) * sc); ctx.stroke();
  }
  px(lx - 2, ly - 2, 4, 4, COL.trunkSh);
}

function drawLighthouse(x, y) {
  const h = 50;
  // 本体(白赤の縞 + 陰影)
  const gB = ctx.createLinearGradient(x, 0, x + 16, 0);
  gB.addColorStop(0, "#ffffff");
  gB.addColorStop(0.5, "#f2f4f8");
  gB.addColorStop(1, "#c2c8d4");
  // テーパー(下広がり)
  ctx.fillStyle = gB;
  ctx.beginPath();
  ctx.moveTo(x + 1, y - h);
  ctx.lineTo(x + 13, y - h);
  ctx.lineTo(x + 16, y);
  ctx.lineTo(x - 2, y);
  ctx.fill();
  // 赤帯
  ctx.fillStyle = COL.buoy;
  for (let i = 0; i < 3; i++) {
    const yy = y - h + 8 + i * 14;
    ctx.fillRect(x - 1 + i, yy, 15 - i * 1.5, 6);
  }
  // 灯室
  px(x - 1, y - h - 8, 16, 8, COL.metal);
  px(x - 1, y - h - 8, 16, 3, COL.metalHi);
  // 光
  const lit = Math.sin(frame * 0.08) * 0.5 + 0.5;
  glow(x + 7, y - h - 4, 18 + lit * 10, COL.battWarn, 0.4 + lit * 0.4);
  px(x + 3, y - h - 6, 8, 5, COL.battWarn);
  px(x + 1, y - h - 14, 14, 4, COL.metalSh);
}

// ============================================================
// 自機(ドローンタクシー)
// ============================================================
function drawTaxi2(x, y, rotorPhase, boosting, blink, tilt) {
  if (blink) return;
  tilt = tilt || 0;
  ctx.save();
  ctx.translate(x + 14, y + 8);
  ctx.rotate(tilt);
  ctx.translate(-14, -8);

  // ローター
  const mast = [[6, -4], [22, -4]];
  for (const [mx] of mast) px(mx - 1, -4, 2, 6, COL.metalSh);
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = COL.metalHi;
  for (const [mx] of mast) { ctx.beginPath(); ctx.ellipse(mx, -5, 12, 2.5, 0, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;
  const spin = Math.floor(rotorPhase) % 2 === 0;
  for (const [mx] of mast) {
    if (spin) px(mx - 11, -6, 22, 2, COL.metal);
    else px(mx - 3, -7, 6, 2, COL.metal);
    px(mx - 1, -7, 2, 3, COL.metalHi);
  }

  // ブースト炎
  if (boosting) {
    const f = Math.random();
    glow(-1, 9, 9 + f * 6, COL.bulletC, 0.55);
    ctx.fillStyle = COL.bulletC;
    ctx.beginPath(); ctx.moveTo(1, 5); ctx.lineTo(-12 - f * 6, 9); ctx.lineTo(1, 13); ctx.fill();
    ctx.fillStyle = COL.battWarn;
    ctx.beginPath(); ctx.moveTo(1, 6); ctx.lineTo(-7 - f * 4, 9); ctx.lineTo(1, 12); ctx.fill();
  }

  // 着陸脚
  px(5, 15, 2, 3, COL.metalSh);
  px(21, 15, 2, 3, COL.metalSh);
  px(3, 17, 7, 2, COL.metal);
  px(18, 17, 7, 2, COL.metal);

  // 車体: アウトライン → グラデ本体
  rrect(0.5, 0.5, 27, 14, 5, COL.ink);
  const gBody = ctx.createLinearGradient(0, 1, 0, 15);
  gBody.addColorStop(0, COL.taxiHi);
  gBody.addColorStop(0.5, COL.taxi);
  gBody.addColorStop(1, COL.taxiSh);
  ctx.save();
  ctx.beginPath();
  roundPath(2, 2, 24, 11, 4);
  ctx.clip();
  ctx.fillStyle = gBody;
  ctx.fillRect(0, 0, 28, 17);
  // チェッカー帯
  for (let i = 0; i < 7; i++) {
    px(2 + i * 4, 8, 2, 2, i % 2 ? COL.ink : COL.white);
    px(4 + i * 4, 8, 2, 2, i % 2 ? COL.white : COL.ink);
  }
  // ボディのハイライト
  ctx.globalAlpha = 0.5;
  px(3, 3, 22, 1, COL.white);
  ctx.globalAlpha = 1;
  ctx.restore();

  // コックピット窓(グラデ + 反射)
  const gG = ctx.createLinearGradient(0, 2, 0, 9);
  gG.addColorStop(0, COL.glassHi);
  gG.addColorStop(0.5, COL.glass);
  gG.addColorStop(1, COL.glassSh);
  ctx.save();
  ctx.beginPath(); roundPath(15, 3, 9, 5, 2); ctx.clip();
  ctx.fillStyle = gG; ctx.fillRect(15, 3, 9, 5);
  ctx.fillStyle = COL.white; ctx.globalAlpha = 0.8;
  px(16, 4, 2, 4, COL.white);
  ctx.globalAlpha = 1;
  ctx.restore();

  // 前照灯 + グロー
  glow(27, 6, 6, COL.battWarn, 0.7);
  px(26, 5, 2, 3, COL.battWarn);

  ctx.restore();
}
function roundPath(x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ============================================================
// 敵・障害物
// ============================================================
function drawEntity(o) {
  const x = o.x - cameraX;
  if (x < -50 || x > W + 50) return;
  if (o.type === "mine") {
    const cx = x + 9, cy = o.y + 9;
    // チェーン
    ctx.strokeStyle = COL.metalSh; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, cy + 8); ctx.lineTo(cx + Math.sin(frame * 0.05) * 3, cy + 22); ctx.stroke();
    // スパイク
    ctx.fillStyle = COL.mineSh;
    for (let a = 0; a < 8; a++) {
      const ang = a / 8 * Math.PI * 2;
      const sxp = cx + Math.cos(ang) * 8, syp = cy + Math.sin(ang) * 8;
      px(sxp - 1.5, syp - 1.5, 4, 4, COL.mineSh);
    }
    // 球体(放射グラデ)
    const g = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, 10);
    g.addColorStop(0, COL.mineHi);
    g.addColorStop(0.5, COL.mine);
    g.addColorStop(1, COL.mineSh);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.fill();
    // 点滅ランプ
    if (Math.floor(frame / 8) % 2 === 0) { glow(cx + 2, cy - 1, 6, COL.battBad, 0.8); px(cx + 1, cy - 2, 2, 2, COL.battBad); }
  } else if (o.type === "buoy") {
    const bob = Math.sin(o.bob + frame * 0.08) * 2;
    const by = o.y + bob, bx = x + 4;
    // 反射(海面)
    ctx.globalAlpha = 0.25; px(bx + 1, SEA_Y + 2, 12, 8, COL.buoy); ctx.globalAlpha = 1;
    const g = ctx.createLinearGradient(bx, 0, bx + 14, 0);
    g.addColorStop(0, COL.buoyHi); g.addColorStop(0.5, COL.buoy); g.addColorStop(1, COL.buoySh);
    rrect(bx - 0.5, by - 0.5, 15, 21, 4, COL.ink);
    ctx.save(); ctx.beginPath(); roundPath(bx, by, 14, 20, 3); ctx.clip();
    ctx.fillStyle = g; ctx.fillRect(bx, by, 14, 20);
    px(bx, by + 6, 14, 4, COL.white);
    px(bx, by + 13, 14, 4, COL.white);
    ctx.restore();
    px(bx + 4, by - 6, 6, 7, COL.metal);
    px(bx + 4, by - 6, 6, 2, COL.metalHi);
    px(bx + 6, by - 11, 2, 5, COL.metalSh);
    glow(bx + 7, by - 11, 5, COL.battBad, Math.floor(frame / 14) % 2 ? 0.7 : 0.2);
  } else if (o.type === "bird") {
    drawEnemyDrone(x, o.y, o.rotorPhase);
  }
}

function drawEnemyDrone(x, y, rotorPhase) {
  // ローター
  const spin = Math.floor(rotorPhase) % 2 === 0;
  ctx.globalAlpha = 0.3; ctx.fillStyle = COL.metalHi;
  ctx.beginPath(); ctx.ellipse(x + 3, y - 3, 9, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 19, y - 3, 9, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  if (spin) { px(x - 5, y - 4, 16, 2, COL.metal); px(x + 11, y - 4, 16, 2, COL.metal); }
  else { px(x - 1, y - 5, 6, 2, COL.metal); px(x + 17, y - 5, 6, 2, COL.metal); }
  // 機体
  rrect(x - 0.5, y - 0.5, 23, 13, 5, COL.ink);
  const g = ctx.createLinearGradient(0, y, 0, y + 12);
  g.addColorStop(0, COL.enemyHi); g.addColorStop(0.5, COL.enemy); g.addColorStop(1, COL.enemySh);
  ctx.save(); ctx.beginPath(); roundPath(x, y, 22, 12, 4); ctx.clip();
  ctx.fillStyle = g; ctx.fillRect(x, y, 22, 12);
  ctx.globalAlpha = 0.4; px(x + 2, y + 1, 18, 1, COL.white); ctx.globalAlpha = 1;
  ctx.restore();
  // 砲(赤目) + グロー
  glow(x + 4, y + 6, 6, COL.bulletC, 0.5);
  px(x + 2, y + 4, 5, 4, COL.bulletC);
  px(x + 3, y + 5, 2, 2, COL.battWarn);
  // センサー
  px(x + 14, y + 4, 5, 4, COL.ink);
  px(x + 15, y + 5, 2, 2, COL.glass);
}

function drawBullet(b) {
  const x = b.x - cameraX;
  glow(x + 2, b.y + 1, 6, COL.bulletC, 0.7);
  px(x, b.y, 5, 3, COL.battWarn);
  px(x + 1, b.y, 2, 3, COL.white);
  // 尾
  ctx.globalAlpha = 0.4; px(x + 4, b.y, 4, 2, COL.bulletC); ctx.globalAlpha = 1;
}

// ============================================================
// パーティクル(加算グロー)
// ============================================================
function addExplosion(wx, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 0.5 + Math.random() * 2.4;
    particles.push({ x: wx, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 18 + Math.random() * 16, max: 34, color, g: 0.04, sz: 2 + Math.random() * 2, glow: true });
  }
}
function addSplash(wx, y) {
  for (let i = 0; i < 26; i++) {
    particles.push({ x: wx + (Math.random() - 0.5) * 22, y,
      vx: (Math.random() - 0.5) * 3, vy: -1.5 - Math.random() * 3.5,
      life: 26 + Math.random() * 18, max: 44, color: i % 2 ? COL.foam : COL.foam2, g: 0.16, sz: 2 + Math.random() * 2, glow: false });
  }
}
function updateParticles() {
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += p.g; p.life--; }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, p.life / p.max);
    if (p.glow) glow(p.x - cameraX, p.y, p.sz * 2.5, p.color, a * 0.6);
    ctx.globalAlpha = a;
    px(p.x - cameraX, p.y, p.sz, p.sz, p.color);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // パネル(グラデ + 下ライン)
  const gP = ctx.createLinearGradient(0, 0, 0, 22);
  gP.addColorStop(0, "rgba(8,12,28,0.95)");
  gP.addColorStop(1, "rgba(8,12,28,0.6)");
  ctx.fillStyle = gP; ctx.fillRect(0, 0, W, 22);
  px(0, 22, W, 1, COL.metalSh);
  px(0, 23, W, 1, "rgba(60,120,255,0.4)");

  ctx.fillStyle = COL.white;
  ctx.font = "bold 9px 'Trebuchet MS', sans-serif";
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.fillText("BATTERY", 6, 11);

  const bx = 64, by = 6, bw = 96, bh = 10;
  rrect(bx - 1, by - 1, bw + 2, bh + 2, 3, COL.ink);
  rrect(bx, by, bw, bh, 2, "#0c1428");
  px(bx + bw, by + 2, 3, bh - 4, COL.metal); // 端子
  const ratio = Math.max(0, player.battery / player.maxBattery);
  const col = ratio > 0.5 ? COL.battGood : ratio > 0.22 ? COL.battWarn : COL.battBad;
  const lowBlink = ratio <= 0.22 && Math.floor(frame / 6) % 2 === 0;
  if (!lowBlink) {
    ctx.save();
    ctx.beginPath(); roundPath(bx + 1, by + 1, (bw - 2) * ratio, bh - 2, 2); ctx.clip();
    const gB = ctx.createLinearGradient(0, by, 0, by + bh);
    gB.addColorStop(0, COL.white); gB.addColorStop(0.25, col); gB.addColorStop(1, col);
    ctx.fillStyle = gB; ctx.fillRect(bx + 1, by + 1, (bw - 2) * ratio, bh - 2);
    ctx.restore();
    if (ratio <= 0.4) glow(bx + (bw - 2) * ratio, by + bh / 2, 8, col, 0.5);
  }
  ctx.fillStyle = COL.white;
  ctx.fillText(Math.ceil(ratio * 100) + "%", bx + bw + 9, 11);

  // 進捗バー
  const prog = Math.min(1, cameraX / GOAL_X);
  const px0 = 210, pw = 96;
  rrect(px0 - 1, 6, pw + 2, 9, 3, COL.ink);
  rrect(px0, 7, pw, 7, 2, "#0c1428");
  ctx.save();
  ctx.beginPath(); roundPath(px0 + 1, 8, (pw - 2) * prog, 5, 2); ctx.clip();
  const gp = ctx.createLinearGradient(0, 8, 0, 13);
  gp.addColorStop(0, COL.foam); gp.addColorStop(1, COL.seaMid);
  ctx.fillStyle = gp; ctx.fillRect(px0 + 1, 8, (pw - 2) * prog, 5);
  ctx.restore();
  // ゴール旗
  px(px0 + pw - 3, 4, 2, 5, COL.metal);
  px(px0 + pw - 1, 4, 4, 3, COL.bulletC);
  // 自機マーカー
  px(px0 + 1 + (pw - 5) * prog, 5, 3, 9, COL.taxi);
}

// ============================================================
// 更新: プレイ中
// ============================================================
function updatePlay() {
  frame++; waves++;
  if (shake > 0) shake--;
  if (flashTimer > 0) flashTimer--;
  if (player.invuln > 0) player.invuln--;

  if (cameraX < GOAL_X) { cameraX += SCROLL_BASE; if (cameraX > GOAL_X) cameraX = GOAL_X; }

  const boosting = (held("Shift", "z") || touch.boost) && player.battery > 0;
  player.boost = boosting;
  const speed = boosting ? 2.9 : 1.8;
  let dyForTilt = 0;

  if (touch.move.active) {
    // タッチ: 自機中心を指の位置へ追従させる(速度上限つき)
    const cx = player.x + player.w / 2, cy = player.y + player.h / 2;
    let ddx = touch.move.gx - cx;
    let ddy = touch.move.gy - cy;
    const dist = Math.hypot(ddx, ddy);
    const maxStep = speed * 1.6; // 指追従の最大移動量/フレーム
    if (dist > 0.5) {
      const step = Math.min(dist, maxStep);
      player.x += ddx / dist * step;
      player.y += ddy / dist * step;
      dyForTilt = Math.max(-1, Math.min(1, ddy / 8));
    }
  } else {
    // キーボード
    let mx = 0, my = 0;
    if (held("ArrowLeft", "a"))  mx -= 1;
    if (held("ArrowRight", "d")) mx += 1;
    if (held("ArrowUp", "w"))    my -= 1;
    if (held("ArrowDown", "s"))  my += 1;
    if (mx && my) { mx *= 0.71; my *= 0.71; }
    player.x += mx * speed;
    player.y += my * speed;
    dyForTilt = my;
  }
  // 機体の傾き(移動方向に応じて)
  player.tilt += ((dyForTilt * 0.12) - player.tilt) * 0.2;

  player.x = Math.max(2, Math.min(W - player.w - 2, player.x));
  player.y = Math.max(26, Math.min(SEA_Y - player.h - 1, player.y));
  player.rotorPhase += boosting ? 0.9 : 0.6;

  player.battery -= boosting ? 0.030 : 0.013;
  if (player.battery <= 0) { player.battery = 0; result = "BATTERY EMPTY"; startFalling(); return; }

  for (const c of cloudsFar)  { c.x -= c.s * 0.5; if (c.x < cameraX - 80) c.x = cameraX + W + Math.random() * 200; }
  for (const c of cloudsNear) { c.x -= c.s * 0.6; if (c.x < cameraX - 80) c.x = cameraX + W + Math.random() * 200; }

  while (nextSpawnX < cameraX + W + 40 && nextSpawnX < GOAL_X - 140) {
    spawnEntity(nextSpawnX);
    const progress = nextSpawnX / GOAL_X;
    const gap = 160 - progress * 64 + Math.random() * 100;
    nextSpawnX += gap;
  }

  const playerWorld = cameraX + player.x;
  for (const o of obstacles) {
    if (!o.alive) continue;
    if (o.type === "mine") {
      o.y = o.baseY + Math.sin(frame * 0.04 + o.phase) * o.amp;
    } else if (o.type === "bird") {
      o.rotorPhase += 0.7;
      o.y = o.baseY + Math.sin(frame * 0.03 + o.phase) * o.amp;
      o.baseY += Math.sign(player.y - o.baseY) * 0.15;
      o.baseY = Math.max(34, Math.min(SEA_Y - 54, o.baseY));
      const sx = o.x - cameraX;
      if (sx > 0 && sx < W) {
        o.cool--;
        if (o.cool <= 0) {
          o.cool = 90 + Math.floor(Math.random() * 50);
          const px0 = o.x, py0 = o.y + 6;
          const tx = playerWorld + player.w / 2, ty = player.y + player.h / 2;
          const dx = tx - px0, dy = ty - py0;
          const d = Math.hypot(dx, dy) || 1;
          const bs = 2.4;
          bullets.push({ x: px0, y: py0, vx: dx / d * bs - SCROLL_BASE, vy: dy / d * bs });
        }
      }
    }
  }

  obstacles = obstacles.filter(o => o.alive && (o.x - cameraX) > -70);

  for (const b of bullets) { b.x += b.vx; b.y += b.vy; }
  bullets = bullets.filter(b => { const sx = b.x - cameraX; return sx > -20 && sx < W + 20 && b.y > 14 && b.y < SEA_Y; });

  const pr = { x: cameraX + player.x, y: player.y, w: player.w, h: player.h };
  if (player.invuln <= 0) {
    for (const o of obstacles) {
      if (!o.alive) continue;
      if (aabb(pr, o)) { damage(o.type === "buoy" ? 8 : 12, o); break; }
    }
  }
  for (const b of bullets) {
    const br = { x: b.x, y: b.y, w: 6, h: 3 };
    if (aabb(pr, br)) { b.dead = true; if (player.invuln <= 0) damage(9, null, b); }
  }
  bullets = bullets.filter(b => !b.dead);

  updateParticles();

  if (cameraX >= GOAL_X && player.x + player.w >= W - 96) startClear();
}

function aabb(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

function damage(amount, obstacle, bullet) {
  player.battery -= amount;
  player.invuln = 60; flashTimer = 8; shake = 9;
  player.x -= 16; player.y += 6;
  player.x = Math.max(2, player.x);
  player.y = Math.min(SEA_Y - player.h - 1, player.y);
  if (obstacle && obstacle.type !== "buoy") {
    obstacle.alive = false;
    addExplosion(obstacle.x + obstacle.w / 2, obstacle.y + obstacle.h / 2, COL.battWarn, 16);
    addExplosion(obstacle.x + obstacle.w / 2, obstacle.y + obstacle.h / 2, COL.bulletC, 8);
  } else if (obstacle && obstacle.type === "buoy") {
    addExplosion(cameraX + player.x + 4, player.y + 8, COL.foam, 10);
  }
  if (bullet) addExplosion(bullet.x, bullet.y, COL.battWarn, 8);
  addExplosion(cameraX + player.x + player.w / 2, player.y + player.h / 2, COL.battBad, 6);
  if (player.battery <= 0) { player.battery = 0; result = "BATTERY EMPTY"; startFalling(); }
}

// ============================================================
// ゲームオーバー演出
// ============================================================
let splashed = false;
function startFalling() {
  state = STATE.FALLING; player.fallVy = -1.6; player.boost = false; shake = 11; splashed = false;
}
function updateFalling() {
  frame++; waves++;
  if (shake > 0) shake--;
  player.fallVy += 0.24;
  player.y += player.fallVy;
  player.x -= 0.6;
  player.rotorPhase += 0.08;
  player.tilt += 0.04;
  player.x += Math.sin(frame * 0.3) * 0.6;
  // 落下煙
  if (frame % 3 === 0) addExplosion(cameraX + player.x + 4, player.y + 8, COL.mineHi, 2);
  updateParticles();
  if (!splashed && player.y + player.h >= SEA_Y) {
    splashed = true; addSplash(cameraX + player.x + player.w / 2, SEA_Y); shake = 13;
  }
  if (player.y > H + 12) state = STATE.GAMEOVER;
}

// ============================================================
// クリア演出
// ============================================================
let clearTimer = 0;
function startClear() {
  state = STATE.CLEAR; clearTimer = 0; result = "STAGE CLEAR";
  for (let i = 0; i < 30; i++)
    addExplosion(cameraX + W - 50 + Math.random() * 36, 46 + Math.random() * 90,
      [COL.taxi, COL.foam2, COL.bulletC, COL.battGood][i % 4], 1);
}
function updateClear() {
  frame++; waves++; clearTimer++;
  player.rotorPhase += 0.6;
  player.tilt += (0 - player.tilt) * 0.1;
  if (player.y < SEA_Y - 34) player.y += 0.4;
  player.x += 0.3;
  player.x = Math.min(W - player.w - 36, player.x);
  if (clearTimer % 14 === 0)
    addExplosion(24 + Math.random() * (W - 48), 34 + Math.random() * 70,
      [COL.taxi, COL.foam2, COL.bulletC, COL.battGood][clearTimer % 4], 8);
  updateParticles();
}

// ============================================================
// 大文字(グラデ + アウトライン + 影)
// ============================================================
function drawBigText(text, cx, cy, c1, c2, size) {
  size = size || 26;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "900 " + size + "px 'Trebuchet MS', sans-serif";
  // 影
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillText(text, cx + 2, cy + 3);
  // アウトライン
  ctx.lineWidth = 4; ctx.strokeStyle = COL.ink; ctx.lineJoin = "round";
  ctx.strokeText(text, cx, cy);
  // グラデ塗り
  const g = ctx.createLinearGradient(0, cy - size / 2, 0, cy + size / 2);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g;
  ctx.fillText(text, cx, cy);
}

// ============================================================
// 画面: タイトル
// ============================================================
function drawTitle() {
  drawBackground(false);
  const ty = 118 + Math.sin(frame * 0.05) * 8;
  drawTaxi2(W / 2 - 14, ty, frame * 0.6, false, false, Math.sin(frame * 0.05) * 0.06);
  drawParticles();

  // ロゴ枠グロー
  glow(W / 2, 60, 120, "#2a5cff", 0.18);
  drawBigText("DRONE TAXI", W / 2, 56, COL.taxiHi, COL.taxiSh, 34);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = COL.white;
  ctx.fillText("～ 海上ステージ 1 ～", W / 2, 84);

  if (Math.floor(frame / 24) % 2 === 0) {
    glow(W / 2, 176, 80, COL.battWarn, 0.15);
    ctx.fillStyle = COL.white;
    ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
    ctx.fillText("PRESS  ENTER  /  SPACE", W / 2, 176);
  }
  ctx.font = "10px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = COL.foam2;
  ctx.fillText("MOVE: ARROWS / WASD     BOOST: SHIFT / Z", W / 2, 210);
  ctx.fillStyle = "#bcd6ff";
  ctx.fillText("ゴールの陸地を目指せ！ バッテリーに注意！", W / 2, 226);
  ctx.textAlign = "left";
}

// ============================================================
// 画面: ゲームオーバー
// ============================================================
function drawGameOver() {
  drawBackground(true);
  ctx.fillStyle = "rgba(4,8,24,0.55)"; ctx.fillRect(0, 0, W, H);
  drawParticles();
  glow(W / 2, 92, 120, "#ff2a2a", 0.18);
  drawBigText("GAME OVER", W / 2, 92, "#ff8a8a", COL.battBad, 32);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = COL.battWarn;
  ctx.fillText(result || "BATTERY EMPTY", W / 2, 122);
  ctx.fillStyle = COL.white;
  ctx.font = "11px 'Trebuchet MS', sans-serif";
  ctx.fillText("到達度  " + Math.floor((cameraX / GOAL_X) * 100) + "%", W / 2, 142);
  if (Math.floor(frame / 24) % 2 === 0) {
    ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = COL.white;
    ctx.fillText("PRESS ENTER TO RETRY", W / 2, 180);
  }
  ctx.textAlign = "left";
}

// ============================================================
// 画面: クリア
// ============================================================
function drawClear() {
  drawBackground(false);
  drawTaxi2(player.x, player.y, player.rotorPhase, false, false, player.tilt);
  drawParticles();
  ctx.fillStyle = "rgba(0,0,0,0.32)"; ctx.fillRect(0, 64, W, 96);
  glow(W / 2, 96, 130, "#ffd23f", 0.18);
  drawBigText("STAGE CLEAR!", W / 2, 96, COL.taxiHi, COL.taxiSh, 30);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = COL.white;
  ctx.fillText("陸地に到着しました！", W / 2, 124);
  ctx.fillStyle = COL.battGood;
  ctx.fillText("残りバッテリー  " + Math.ceil(player.battery) + "%", W / 2, 142);
  if (clearTimer > 60 && Math.floor(frame / 24) % 2 === 0) {
    ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = COL.white;
    ctx.fillText("PRESS ENTER", W / 2, 178);
  }
  ctx.textAlign = "left";
}

// ============================================================
// タッチUI: BOOSTボタン
// ============================================================
function drawBoostButton() {
  const on = touch.boost && player.battery > 0;
  const empty = player.battery <= 0;
  // 外周グロー
  glow(BTN.x, BTN.y, BTN.r + (on ? 12 : 6), on ? COL.bulletC : "#2a5cff", on ? 0.6 : 0.25);
  // 台座
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(BTN.x, BTN.y, BTN.r, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(BTN.x - 6, BTN.y - 6, 2, BTN.x, BTN.y, BTN.r);
  if (empty) { g.addColorStop(0, "#555"); g.addColorStop(1, "#222"); }
  else if (on) { g.addColorStop(0, COL.battWarn); g.addColorStop(1, COL.bulletC); }
  else { g.addColorStop(0, "#7fb0ff"); g.addColorStop(1, "#2547a8"); }
  ctx.fillStyle = g; ctx.fill();
  ctx.globalAlpha = 1;
  // リング
  ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.beginPath(); ctx.arc(BTN.x, BTN.y, BTN.r - 2, 0, Math.PI * 2); ctx.stroke();
  // 稲妻アイコン
  ctx.fillStyle = empty ? "#888" : COL.white;
  ctx.beginPath();
  ctx.moveTo(BTN.x + 3, BTN.y - 11);
  ctx.lineTo(BTN.x - 6, BTN.y + 1);
  ctx.lineTo(BTN.x - 1, BTN.y + 1);
  ctx.lineTo(BTN.x - 3, BTN.y + 11);
  ctx.lineTo(BTN.x + 7, BTN.y - 2);
  ctx.lineTo(BTN.x + 1, BTN.y - 2);
  ctx.closePath(); ctx.fill();
}

// ============================================================
// メインループ
// ============================================================
function render() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  if (state === STATE.TITLE) {
    drawTitle();
  } else if (state === STATE.PLAY || state === STATE.FALLING) {
    drawBackground(false);
    for (const o of obstacles) drawEntity(o);
    for (const b of bullets) drawBullet(b);
    const blink = state === STATE.PLAY && player.invuln > 0 && Math.floor(frame / 4) % 2 === 0;
    drawTaxi2(player.x, player.y, player.rotorPhase, player.boost, blink, player.tilt);
    drawParticles();
    drawHUD();
    if (flashTimer > 0) {
      ctx.fillStyle = "rgba(255,40,40," + (flashTimer / 8 * 0.35) + ")";
      ctx.fillRect(0, 0, W, H);
    }
    if (state === STATE.PLAY && player.battery <= player.maxBattery * 0.22 && Math.floor(frame / 18) % 2 === 0) {
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      glow(W / 2, 36, 70, COL.battBad, 0.2);
      ctx.fillStyle = COL.battBad;
      ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
      ctx.fillText("!! LOW BATTERY !!", W / 2, 32);
      ctx.textAlign = "left";
    }
    // スマホ操作UI
    if (isTouch && state === STATE.PLAY) drawBoostButton();
  } else if (state === STATE.GAMEOVER) {
    drawGameOver();
  } else if (state === STATE.CLEAR) {
    drawClear();
  }
  ctx.restore();
}

function update() {
  switch (state) {
    case STATE.TITLE:    frame++; if (tapAnyConfirm()) { resetGame(); state = STATE.PLAY; } break;
    case STATE.PLAY:     updatePlay(); break;
    case STATE.FALLING:  updateFalling(); break;
    case STATE.GAMEOVER: frame++; if (tapAnyConfirm()) { state = STATE.TITLE; frame = 0; } break;
    case STATE.CLEAR:    updateClear(); if (clearTimer > 60 && tapAnyConfirm()) { state = STATE.TITLE; frame = 0; } break;
  }
}

function loop() { update(); render(); requestAnimationFrame(loop); }

resetGame();
state = STATE.TITLE; frame = 0;
loop();

})();
</script>
