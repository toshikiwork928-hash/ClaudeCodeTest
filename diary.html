<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Diary — {name}">
  <title>Diary — {name}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="diary">

  <!-- ===== NAVIGATION ===== -->
  <nav class="nav" role="navigation" aria-label="メインナビゲーション">
    <div class="nav__inner">
      <a href="./index.html" class="nav__logo" aria-label="ホームへ">—</a>
      <div class="nav__links" role="list">
        <a href="./index.html"     class="nav__link" role="listitem">Home</a>
        <a href="./portfolio.html" class="nav__link" role="listitem">Portfolio</a>
        <a href="./diary.html"     class="nav__link" role="listitem">Diary</a>
        <a href="./gallery.html"   class="nav__link" role="listitem">Gallery</a>
      </div>
      <button class="nav__toggle" aria-label="メニューを開閉する">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="nav__mobile-menu" role="dialog" aria-label="モバイルメニュー">
    <nav class="nav__mobile-links">
      <a href="./index.html"     class="nav__mobile-link">Home</a>
      <a href="./portfolio.html" class="nav__mobile-link">Portfolio</a>
      <a href="./diary.html"     class="nav__mobile-link">Diary</a>
      <a href="./gallery.html"   class="nav__mobile-link">Gallery</a>
    </nav>
  </div>

  <!-- ===== PAGE HEADER ===== -->
  <header class="page-header">
    <div class="container">
      <div class="page-header__label">Writing</div>
      <h1 class="page-header__title">Diary</h1>
      <p class="page-header__desc">
        日常の断片、考えたこと、気づいたこと。
      </p>
    </div>
  </header>

  <!-- ===== DIARY ENTRIES ===== -->
  <main>
    <div class="container">
      <div class="diary-list diary-page-list" role="list" aria-label="日記一覧">
        <!-- JS fills this -->
      </div>
      <div style="height: 5rem;"></div>
    </div>
  </main>

  <!-- ===== DIARY MODAL ===== -->
  <div class="diary-modal" role="dialog" aria-modal="true" aria-label="日記の詳細">
    <div class="diary-modal__backdrop" aria-hidden="true"></div>
    <div class="diary-modal__panel">
      <div class="diary-modal__topbar">
        <span class="diary-modal__topbar-label">Diary</span>
        <button class="diary-modal__close-btn" aria-label="閉じる">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Close
        </button>
      </div>
      <div class="diary-modal__content">
        <div class="diary-modal__meta">
          <span class="diary-modal__date">—</span>
          <div class="diary-modal__tags"></div>
        </div>
        <h2 class="diary-modal__title">—</h2>
        <img class="diary-modal__cover" src="" alt="" role="presentation">
        <div class="diary-modal__body">
          <!-- JS fills this -->
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__inner">
        <div class="footer__left">
          <div class="footer__name">—</div>
          <div class="footer__copy">© — All rights reserved.</div>
        </div>
        <div class="footer__social">
          <!-- JS fills this -->
        </div>
      </div>
    </div>
  </footer>

  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
