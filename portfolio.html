<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio — {name}">
  <title>Portfolio — {name}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="portfolio">

  <!-- ===== NAVIGATION ===== -->
  <nav class="nav" role="navigation" aria-label="メインナビゲーション">
    <div class="nav__inner">
      <a href="./index.html" class="nav__logo" aria-label="ホームへ">—</a>
      <div class="nav__links" role="list">
        <a href="./index.html"     class="nav__link" role="listitem">Home</a>
        <a href="./portfolio.html" class="nav__link" role="listitem">Portfolio</a>
        <a href="./diary.html"     class="nav__link" role="listitem">Diary</a>
        <a href="./gallery.html"   class="nav__link" role="listitem">Gallery</a>
      </div>
      <button class="nav__toggle" aria-label="メニューを開閉する">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="nav__mobile-menu" role="dialog" aria-label="モバイルメニュー">
    <nav class="nav__mobile-links">
      <a href="./index.html"     class="nav__mobile-link">Home</a>
      <a href="./portfolio.html" class="nav__mobile-link">Portfolio</a>
      <a href="./diary.html"     class="nav__mobile-link">Diary</a>
      <a href="./gallery.html"   class="nav__mobile-link">Gallery</a>
    </nav>
  </div>

  <!-- ===== PAGE HEADER ===== -->
  <header class="page-header">
    <div class="container">
      <div class="page-header__label">Work</div>
      <h1 class="page-header__title">Portfolio</h1>
      <p class="page-header__desc">
        デザイン・開発・写真など、これまでの制作物をまとめています。
      </p>
    </div>
  </header>

  <!-- ===== PORTFOLIO CONTENT ===== -->
  <main>
    <div class="container">
      <!-- Category Filters -->
      <div class="portfolio-filters" role="group" aria-label="カテゴリフィルター">
        <!-- JS fills this -->
      </div>

      <!-- Portfolio Grid -->
      <div class="portfolio-grid" role="list" aria-label="ポートフォリオ一覧">
        <!-- JS fills this -->
      </div>

      <!-- Spacing -->
      <div style="height: 5rem;"></div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__inner">
        <div class="footer__left">
          <div class="footer__name">—</div>
          <div class="footer__copy">© — All rights reserved.</div>
        </div>
        <div class="footer__social">
          <!-- JS fills this -->
        </div>
      </div>
    </div>
  </footer>

  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
